apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-transcriber-worker
  namespace: transcription
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audio-transcriber-worker
  template:
    metadata:
      labels:
        app: audio-transcriber-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/loaspra/audio-transcriber-service:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.workers.poller"]
          envFrom:
            - configMapRef:
                name: audio-transcriber-config
            - secretRef:
                name: audio-transcriber-secret
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "6Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: audio-transcriber-data
