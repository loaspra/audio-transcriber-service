apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-transcriber-worker
  namespace: transcription
spec:
  template:
    spec:
      runtimeClassName: nvidia
      containers:
        - name: worker
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "6Gi"
              nvidia.com/gpu: "1"
